priority_score:
  description: >
    Score from 0 to 100 computed from:
    - Persona relevance (max 35 pts)
    - Strategic market relevance (max 30 pts)
    - Seniority level (max 15 pts)
    - Recency of connection (max 10 pts)
    - Company signal (max 10 pts)
  high_threshold: 70
  medium_threshold: 40
