name: Build LinkedIn Network Report

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run network heatmap pipeline
        run: |
          python src/build_network_heatmap.py

      - name: Run strategy layer
        run: |
          python src/build_strategy_layer.py

      - name: Verify dashboard imports
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          dashboard_path = Path("app/dashboard.py")

          if not dashboard_path.exists():
              raise FileNotFoundError("app/dashboard.py was not found")

          ast.parse(dashboard_path.read_text(encoding="utf-8"))
          print("dashboard.py OK")
          PY

      - name: Upload reports and outputs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: network-reports-${{ github.run_number }}
          path: |
            reports/
            outputs/
          retention-days: 30

      - name: Upload Excel dashboard
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-excel-${{ github.run_number }}
          path: reports/dashboard_ready.xlsx
          retention-days: 30
