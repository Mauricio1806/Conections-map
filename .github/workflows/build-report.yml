name: Validate LinkedIn Network Dashboard

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Architecture: docs/assets/dashboard_data.json is generated LOCALLY
# (with messages.csv) and committed. GitHub Actions only validates the
# committed files. It never regenerates the dashboard to avoid wiping
# Lead Reactivation data that requires messages.csv.

jobs:
  validate-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Privacy Check
        run: python src/privacy_check.py

      - name: Verify required dashboard files
        run: |
          echo "Verifying committed dashboard files..."
          test -f docs/index.html                  && echo "[OK] docs/index.html"                  || { echo "[FAIL] docs/index.html missing";                  exit 1; }
          test -f docs/assets/dashboard_data.json  && echo "[OK] docs/assets/dashboard_data.json"  || { echo "[FAIL] docs/assets/dashboard_data.json missing";  exit 1; }
          test -f docs/assets/style.css            && echo "[OK] docs/assets/style.css"            || { echo "[FAIL] docs/assets/style.css missing";            exit 1; }
          test -f docs/assets/app.js               && echo "[OK] docs/assets/app.js"               || { echo "[FAIL] docs/assets/app.js missing";              exit 1; }
          echo "All required dashboard files present."

      - name: Verify Lead Reactivation data integrity
        run: |
          python -c "
          import json, sys
          with open('docs/assets/dashboard_data.json', encoding='utf-8') as f:
              d = json.load(f)
          lr = d.get('lead_reactivation', {})
          available = lr.get('messages_csv_available', False)
          total = lr.get('total_conversations', 0)
          if available and total > 0:
              print(f'[OK] Lead Reactivation data present: {total} conversations')
          else:
              print('[INFO] Lead Reactivation: no message data (messages.csv is local-only)')
          print('[OK] Lead Reactivation integrity check passed')
          "
