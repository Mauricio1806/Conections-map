name: Build LinkedIn Network Report

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (classify + heatmaps)
        run: python src/build_network_heatmap.py

      - name: Run strategy layer (KPIs + action plans + reports)
        run: python src/build_strategy_layer.py

      - name: Verify dashboard imports (syntax check)
        run: python -c "import ast; ast.parse(open('app/dashboard.py').read()); print('dashboard.py: OK')"

      - name: Upload all reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: network-reports-${{ github.run_number }}
          path: |
            reports/
            outputs/
          retention-days: 30

      - name: Upload Excel dashboard
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-excel-${{ github.run_number }}
          path: reports/dashboard_ready.xlsx
          retention-days: 90

      - name: Upload executive strategy report
        uses: actions/upload-artifact@v4
        with:
          name: executive-report-${{ github.run_number }}
          path: reports/executive_strategy_report.md
          retention-days: 90
