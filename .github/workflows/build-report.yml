name: Build LinkedIn Network Report

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Step 1 - Build Network Heatmap
        run: python src/build_network_heatmap.py

      - name: Run Step 2 - Build Strategy Layer (V3)
        run: python src/build_strategy_layer.py

      - name: Run Step 3 - Generate Static Dashboard
        run: python src/generate_static_dashboard.py

      - name: Run Step 4 - Privacy Check
        run: python src/privacy_check.py

      - name: Verify required dashboard files
        run: |
          echo "Verifying dashboard files exist..."
          test -f docs/index.html                  && echo "[OK] docs/index.html"                  || { echo "[FAIL] docs/index.html missing";                  exit 1; }
          test -f docs/assets/dashboard_data.json  && echo "[OK] docs/assets/dashboard_data.json"  || { echo "[FAIL] docs/assets/dashboard_data.json missing";  exit 1; }
          test -f docs/assets/style.css            && echo "[OK] docs/assets/style.css"            || { echo "[FAIL] docs/assets/style.css missing";            exit 1; }
          test -f docs/assets/app.js               && echo "[OK] docs/assets/app.js"               || { echo "[FAIL] docs/assets/app.js missing";               exit 1; }
          echo "All required files present."

      - name: Commit updated outputs and dashboard
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/ outputs/ reports/

          if git diff --cached --quiet; then
            echo "No generated files changed."
          else
            git commit -m "update generated LinkedIn network dashboard [skip ci]"
            git push
          fi
