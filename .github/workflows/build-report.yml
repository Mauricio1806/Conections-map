name: Build LinkedIn Network Report

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run network heatmap pipeline
        run: |
          python src/build_network_heatmap.py

      - name: Run strategy layer (V2 inference + confidence KPIs)
        run: |
          python src/build_strategy_layer.py

      - name: Generate static HTML dashboard
        run: |
          python src/generate_static_dashboard.py

      - name: Verify static dashboard files
        run: |
          python - <<'PY'
          from pathlib import Path
          required = [
            "docs/index.html",
            "docs/assets/dashboard_data.json",
            "docs/assets/style.css",
            "docs/assets/app.js",
          ]
          missing = [p for p in required if not Path(p).exists()]
          if missing:
              raise FileNotFoundError(f"Missing dashboard files: {missing}")
          # Verify no email in public JSON
          import json
          data = json.loads(Path("docs/assets/dashboard_data.json").read_text(encoding="utf-8"))
          contacts = data.get("top_contacts", [])
          for c in contacts:
              if "email address" in str(c).lower():
                  raise ValueError("PII (email) found in public dashboard JSON!")
          print(f"All {len(required)} required files present. No PII detected in {len(contacts)} contacts.")
          PY

      - name: Upload reports and outputs
        uses: actions/upload-artifact@v4
        with:
          name: network-reports-${{ github.run_number }}
          path: |
            reports/
            outputs/
          retention-days: 30

      - name: Upload static dashboard
        uses: actions/upload-artifact@v4
        with:
          name: static-dashboard-${{ github.run_number }}
          path: docs/
          retention-days: 90
